kind: categoryToolbox
contents:
  # Text ======================================================================
  - kind: category
    name: 文本
    colour: 160
    contents:
      # - kind: block
      #   type: text

      - kind: block
        type: text_multiline

      # - kind: block
      #   type: translate
      #   fields:
      #     TEXT: 通规

      - kind: block
        type: translate_multiline
        fields:
          TEXT: 通规

      - kind: block
        type: translate_block

  # Math ======================================================================
  - kind: category
    name: 数学
    colour: 230
    contents:
      - kind: block
        type: number

      - kind: block
        type: number_block

      - kind: block
        type: choice

      - kind: block
        type: calculate

  # Controls ==================================================================
  - kind: category
    name: 控制
    colour: 120
    contents:
      - kind: block
        type: controls_repeat

  # Variables =================================================================
  - kind: category
    name: 变量
    colour: 330
    contents:
      - kind: block
        type: variables_get

      - kind: block
        type: variables_set

      - kind: block
        type: variables_set_block
        inputs:
          VAR:
            shadow:
              type: text
              fields:
                TEXT: 变量 # "%{BKY_VARIABLES_DEFAULT_NAME}"

      - kind: block
        type: variables_get_linger

      - kind: block
        type: variables_set_linger
