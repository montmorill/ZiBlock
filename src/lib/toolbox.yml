kind: categoryToolbox

contents:
  # Text ======================================================================
  - kind: category
    name: 文本
    colour: "%{BKY_TEXTS_HUE}"
    contents:
      # - { kind: block, type: text }
      - { kind: block, type: text_multiline }
      # - { kind: block, type: translate, fields: { TEXT: 通规 } }
      - { kind: block, type: translate_multiline, fields: { TEXT: 通规 } }
      - { kind: block, type: translate_block }

  # Math ======================================================================
  - kind: category
    name: 数学
    colour: "%{BKY_MATH_HUE}"
    contents:
      # - { kind: block, type: number }
      - kind: block
        type: number_block
        inputs: { BODY: &shadow_multiline { shadow: { type: text_multiline } } }
      # - { kind: block, type: calculate }
      - kind: block
        type: calculate_block
        inputs: { BODY: *shadow_multiline }
      - { kind: block, type: choice }

  # Controls ==================================================================
  - kind: category
    name: 循环
    colour: "%{BKY_LOOPS_HUE}"
    contents:
      - { kind: block, type: controls_repeat }
      - { kind: block, type: controls_repeat_block }

  # Variables =================================================================
  - kind: category
    name: 变量
    colour: "%{BKY_VARIABLES_HUE}"
    contents:
      - kind: block
        type: variables_get
        fields: { VAR: "%{BKY_VARIABLES_DEFAULT_NAME}" }
      - kind: block
        type: variables_set
        fields: { VAR: "%{BKY_VARIABLES_DEFAULT_NAME}" }
      - { kind: block, type: variables_set_block }
      - { kind: block, type: variables_get_linger }
      - { kind: block, type: variables_set_linger }
