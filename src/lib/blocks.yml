# Text ========================================================================
- type: text
  message0: "%1"
  args0:
    - type: field_input
      name: TEXT
  style: text_blocks
  previousStatement: null
  nextStatement: null
  extensions:
    - text_quotes

- type: translate
  message0: ⟪ %1 ⟫
  args0:
    - type: field_input
      name: TEXT
  previousStatement: null
  nextStatement: null
  style: text_blocks

- type: translate_block
  message0: "%1"
  args0:
    - type: input_statement
      check: translate_block
      name: BODY
  previousStatement: null
  nextStatement: null
  style: text_blocks

# Math ========================================================================
- type: number
  message0: "%1"
  args0:
    - type: field_number
      name: NUM
      value: 0
  previousStatement: null
  nextStatement: null
  style: math_blocks

- type: choice
  message0: 选择 %1
  args0:
    - type: input_statement
      check: translate_block
      name: BODY
  previousStatement: null
  nextStatement: null
  style: math_blocks

- type: calculate
  message0: 计算 %1
  args0:
    - type: input_statement
      check: translate_block
      name: BODY
  previousStatement: null
  nextStatement: null
  style: math_blocks

# Controls ====================================================================
- type: controls_repeat
  message0: 重复 %1 次
  args0:
    - type: field_number
      name: TIMES
      value: 10
      min: 0
      precision: 1
  message1: "%1"
  args1:
    - type: input_statement
      name: BODY
  message2: 懒加载 %1
  args2:
    - type: field_checkbox
      name: LAZY
  previousStatement: null
  nextStatement: null
  style: loop_blocks
  tooltip: "%{BKY_CONTROLS_REPEAT_TOOLTIP}"
  helpUrl: "%{BKY_CONTROLS_REPEAT_HELPURL}"

# Variables ===================================================================

- type: variables_get
  message0: "%1"
  args0:
    - type: field_variable
      name: VAR
      variable: "%{BKY_VARIABLES_DEFAULT_NAME}"
  previousStatement: null
  nextStatement: null
  style: variable_blocks
  extensions:
    - contextMenu_variableSetterGetter

- type: variables_set
  message0: 设置 %1
  args0:
    - type: field_variable
      name: VAR
      variable: "%{BKY_VARIABLES_DEFAULT_NAME}"
  message1: 为 %1
  args1:
    - type: input_statement
      name: VALUE
  previousStatement: null
  nextStatement: null
  style: variable_blocks
  extensions:
    - contextMenu_variableSetterGetter

- type: variables_set_block
  message0: 设置 %1
  args0:
    - type: input_statement
      name: VAR
  message1: 为 %1
  args1:
    - type: input_statement
      name: VALUE
  previousStatement: null
  nextStatement: null
  style: variable_blocks
  extensions:
    - contextMenu_variableSetterGetter
