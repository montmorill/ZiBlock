# Text ========================================================================
- type: text
  message0: "%1"
  args0:
    - &input_text
      type: field_input
      name: TEXT
  <<:
    - &text_text
      <<: &text
        <<: &statements
          previousStatement: null
          nextStatement: null
        style: text_blocks
      tooltip: "%{BKY_TEXT_TEXT_TOOLTIP}"
      helpUrl: "%{BKY_TEXT_TEXT_HELPURL}"
  extensions: [text_quotes]

- type: text_multiline
  message0: "%1 %2"
  args0:
    - type: field_image
      src:
        data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAwAAAARCAYAAADpP
        U2iAAAABGdBTUEAALGPC/xhBQAAAAlwSFlzAAAdhgAAHYYBXaITgQAAABh0RVh0
        U29mdHdhcmUAcGFpbnQubmV0IDQuMS42/U4J6AAAAP1JREFUOE+Vks0KQUEYhjm
        RIja4ABtZ2dm5A3t3Ia6AUm7CylYuQRaUhZSlLZJiQbFAyRnPN33y01HOW08z88
        73zpwzM4F3GWOCruvGIE4/rLaV+Nq1hVGMBqzhqlxgCys4wJA65xnogMHsQ5luj
        nYHTejBBCK2mE4abjCgMGhNxHgDFWjDSG07kdfVa2pZMf4ZyMAdWmpZMfYOsLiD
        MYMjlMB+K613QISRhTnITnsYg5yUd0DETmEoMlkFOeIT/A58iyK5E18BuTBfgYX
        fwNJv4P9/oEBerLylOnRhygmGdPpTTBZAPkde61lbQe4moWUvYUZYLfUNftIY4z
        wA5X2Z9AYnQrEAAAAASUVORK5CYII=
      width: 12
      height: 17
      alt: \u00B6
    - &field_input_multiline
      type: field_multilinetext
      name: TEXT
  <<: *text_text

- type: translate
  message0: ⟪ %1 ⟫
  args0: [*input_text]
  <<: &text_translate
    <<: *text
    tooltip: "%{BKY_TEXT_TRANSLATE_TOOLTIP}"
    helpUrl: "%{BKY_TEXT_TRANSLATE_HELPURL}"

- type: translate_multiline
  message0: ⟪ %1 ⟫
  args0: [*field_input_multiline]
  <<: *text_translate

- type: translate_block
  message0: "%1"
  args0:
    - &statement_body
      type: input_statement
      name: BODY
  <<: *text_translate

# Math ========================================================================
- type: number
  message0: "# %1"
  args0:
    - <<: *input_text
      value: 0
  <<:
    - &math_number
      <<: &math_blocks
        <<: *statements
        style: math_blocks
      tooltip: "%{BKY_MATH_NUMBER_TOOLTIP}"
      helpUrl: "%{BKY_MATH_NUMBER_HELPURL}"

- type: number_block
  message0: "# %1"
  args0: [*statement_body]
  <<: *math_number

- type: calculate
  message0: = %1
  args0: [*input_text]
  <<: &math_calculate
    <<: *math_blocks
    tooltip: "%{BKY_MATH_CALCULATE_TOOLTIP}"
    helpUrl: "%{BKY_MATH_CALCULATE_HELPURL}"

- type: calculate_block
  message0: = %1
  args0: [*statement_body]
  <<: *math_calculate

- type: choice
  message0: 选择
  message1: "%1"
  args1: [*statement_body]
  <<: *math_blocks

# Controls ====================================================================
- type: controls_repeat
  message0: 重复 %1 次
  args0:
    - # &number_times
      type: field_number
      name: TIMES
      value: 10
      min: 0
      precision: 1
  message1: "%1"
  args1: [*statement_body]
  message2: 懒加载 %1
  args2: &checkbox_lazy
    - type: field_checkbox
      name: LAZY
      checked: TRUE
  <<:
    - *statements
    - &controls_repeat
      <<: # &loop_blocks
        style: loop_blocks
        <<: *statements
      tooltip: "%{BKY_CONTROLS_REPEAT_TOOLTIP}"
      helpUrl: "%{BKY_CONTROLS_REPEAT_HELPURL}"

- type: controls_repeat_block
  message0: 重复 %1
  args0:
    - # &statement_times
      type: input_statement
      name: TIMES
  message1: 次 %1
  args1: [*statement_body]
  message2: 懒加载 %1
  args2: *checkbox_lazy
  <<: *controls_repeat

# Variables ===================================================================
- type: variables_get
  message0: "%1"
  args0:
    - &variable_var
      type: field_variable
      name: VAR
      variable: "%{BKY_VARIABLES_DEFAULT_NAME}"
  <<:
    <<: &variable_blocks
      <<: *statements
      style: variable_blocks
      extensions: [contextMenu_variableSetterGetter]
    tooltip: "%{BKY_VARIABLES_GET_TOOLTIP}"
    helpUrl: "%{BKY_VARIABLES_GET_HELPURL}"

- type: variables_set
  message0: 设置 %1
  args0: [*variable_var]
  message1: 为 %1
  args1: [*statement_body]
  message2: "回响 %1"
  args2:
    - &checkbox_echo
      type: field_checkbox
      name: ECHO
  <<: &variables_set
    <<: *variable_blocks
    tooltip: "%{BKY_VARIABLES_SET_TOOLTIP}"
    helpUrl: "%{BKY_VARIABLES_SET_HELPURL}"

- type: variables_set_block
  message0: 设置 %1
  args0:
    - type: input_statement
      name: VAR
  message1: 为 %1
  args1: [*statement_body]
  message2: "回响 %1"
  args2: [*checkbox_echo]
  <<: *variables_set

- type: variables_get_linger
  message0: 导入 %1
  args0:
    - &input_scope
      type: field_input
      name: SCOPE
      text: scope
  <<: &variable_dynamic_blocks
    <<: *variable_blocks
    style: variable_dynamic_blocks

- type: variables_set_linger
  message0: 导出 %1 到 %2
  args0: [*variable_var, *input_scope]
  <<: *variable_dynamic_blocks
