# Text ========================================================================
- type: text
  message0: "%1"
  args0:
    - type: field_input
      name: TEXT
  previousStatement: null
  nextStatement: null
  style: text_blocks
  tooltip: "%{BKY_TEXT_TEXT_TOOLTIP}"
  helpUrl: "%{BKY_TEXT_TEXT_HELPURL}"
  extensions:
    - text_quotes

- type: text_multiline
  message0: "%1"
  args0:
    - type: field_multilinetext
      name: TEXT
  previousStatement: null
  nextStatement: null
  style: text_blocks
  tooltip: "%{BKY_TEXT_TEXT_TOOLTIP}"
  helpUrl: "%{BKY_TEXT_TEXT_HELPURL}"
  extensions:
    - text_quotes

- type: translate
  message0: ⟪ %1 ⟫
  args0:
    - type: field_input
      name: TEXT
  previousStatement: null
  nextStatement: null
  style: text_blocks
  tooltip: "%{BKY_TEXT_TEXT_TOOLTIP}"
  helpUrl: "%{BKY_TEXT_TEXT_HELPURL}"

- type: translate_multiline
  message0: ⟪ %1 ⟫
  args0:
    - type: field_multilinetext
      name: TEXT
  previousStatement: null
  nextStatement: null
  style: text_blocks
  tooltip: "%{BKY_TEXT_TEXT_TOOLTIP}"
  helpUrl: "%{BKY_TEXT_TEXT_HELPURL}"
  extensions:

- type: translate_block
  message0: "%1"
  args0:
    - type: input_statement
      name: BODY
  previousStatement: null
  nextStatement: null
  style: text_blocks

# Math ========================================================================
- type: number
  message0: "# %1"
  args0:
    - type: field_input
      name: BODY
      value: 0
  previousStatement: null
  nextStatement: null
  style: math_blocks
  tooltip: "%{BKY_MATH_NUMBER_TOOLTIP}"
  helpUrl: "%{BKY_MATH_NUMBER_HELPURL}"

- type: number_block
  message0: "# %1"
  args0:
    - type: input_statement
      name: BODY
  previousStatement: null
  nextStatement: null
  style: math_blocks
  tooltip: "%{BKY_MATH_NUMBER_TOOLTIP}"
  helpUrl: "%{BKY_MATH_NUMBER_HELPURL}"

- type: choice
  message0: 选择
  message1: "%1"
  args1:
    - type: input_statement
      name: BODY
  previousStatement: null
  nextStatement: null
  style: math_blocks

- type: calculate
  message0: = %1
  args0:
    - type: field_input
      name: BODY
  previousStatement: null
  nextStatement: null
  style: math_blocks

# Controls ====================================================================
- type: controls_repeat
  message0: 重复 %1 次
  args0:
    - type: field_number
      name: TIMES
      value: 10
      min: 0
      precision: 1
  message1: "%1"
  args1:
    - type: input_statement
      name: BODY
  message2: 懒加载 %1
  args2:
    - type: field_checkbox
      name: LAZY
      checked: TRUE
  previousStatement: null
  nextStatement: null
  style: loop_blocks
  tooltip: "%{BKY_CONTROLS_REPEAT_TOOLTIP}"
  helpUrl: "%{BKY_CONTROLS_REPEAT_HELPURL}"

# Variables ===================================================================
- type: variables_get
  message0: "%1"
  args0:
    - type: field_variable
      name: VAR
      variable: "%{BKY_VARIABLES_DEFAULT_NAME}"
  previousStatement: null
  nextStatement: null
  style: variable_blocks
  tooltip: "%{BKY_VARIABLES_GET_TOOLTIP}"
  helpUrl: "%{BKY_VARIABLES_GET_HELPURL}"
  extensions:
    - contextMenu_variableSetterGetter

- type: variables_set
  message0: 设置 %1
  args0:
    - type: field_variable
      name: VAR
      variable: "%{BKY_VARIABLES_DEFAULT_NAME}"
  message1: 为 %1
  args1:
    - type: input_statement
      name: VALUE
  message2: "回响 %1"
  args2:
    - type: field_checkbox
      name: ECHO
  previousStatement: null
  nextStatement: null
  style: variable_blocks
  tooltip: "%{BKY_VARIABLES_SET_TOOLTIP}"
  helpUrl: "%{BKY_VARIABLES_SET_HELPURL}"
  extensions:
    - contextMenu_variableSetterGetter

- type: variables_set_block
  message0: 设置 %1
  args0:
    - type: input_statement
      name: VAR
  message1: 为 %1
  args1:
    - type: input_statement
      name: VALUE
  message2: "回响 %1"
  args2:
    - type: field_checkbox
      name: ECHO
  previousStatement: null
  nextStatement: null
  style: variable_blocks
  tooltip: "%{BKY_VARIABLES_SET_TOOLTIP}"
  helpUrl: "%{BKY_VARIABLES_SET_HELPURL}"
  extensions:
    - contextMenu_variableSetterGetter

- type: variables_get_linger
  message0: 导入 %1
  args0:
    - type: field_input
      name: SCOPE
      text: scope
  previousStatement: null
  nextStatement: null
  style: variable_dynamic_blocks
  extensions:
    - contextMenu_variableSetterGetter

- type: variables_set_linger
  message0: 导出 %1 到 %2
  args0:
    - type: field_variable
      name: VAR
      variable: "%{BKY_VARIABLES_DEFAULT_NAME}"
    - type: field_input
      name: SCOPE
      text: scope
  previousStatement: null
  nextStatement: null
  style: variable_dynamic_blocks
